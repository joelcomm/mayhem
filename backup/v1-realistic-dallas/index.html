<title>Carjacker</title>
<style>
  :root { --accent: #ff3d7f; --cyan: #35e0ff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #0a0a12; font-family: "Segoe UI", system-ui, sans-serif; }

  canvas { display: block; }

  #hud { position: fixed; inset: 0; pointer-events: none; color: #fff; }

  #speedo { position: absolute; right: 26px; bottom: 24px; width: 150px; height: 150px;
    display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 6px 18px rgba(0,0,0,.55)); }
  #speedo .val { position: absolute; text-align: center; font-weight: 800; font-size: 40px; letter-spacing: -1px; text-shadow: 0 2px 8px rgba(0,0,0,.6); }
  #speedo .unit { position: absolute; bottom: 34px; font-size: 12px; letter-spacing: 3px; opacity: .6; }
  #score { position: absolute; left: 24px; top: 100px; font-size: 27px; font-weight: 900; letter-spacing: 1px;
    color: #7CFC70; text-shadow: 0 2px 12px rgba(0,0,0,.55); transition: transform .08s; transform-origin: left center; }
  #wanted { position: absolute; left: 24px; top: 140px; font-size: 24px; letter-spacing: 4px; color: #ffd23b;
    text-shadow: 0 0 12px rgba(255,180,0,.7); display: none; }
  #health { position: absolute; right: 26px; bottom: 190px; width: 150px; height: 9px; border-radius: 5px;
    background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.18); overflow: hidden; }
  #health i { display: block; height: 100%; width: 100%; background: #5bd75b; transition: width .2s, background .2s; }
  #busted { position: fixed; inset: 0; z-index: 15; display: flex; align-items: center; justify-content: center;
    font-size: 84px; font-weight: 900; letter-spacing: 10px; color: #ff3b3b; background: rgba(30,0,0,.5);
    opacity: 0; transition: opacity .35s; pointer-events: none; text-shadow: 0 4px 30px rgba(0,0,0,.7); }
  #gear { position: absolute; right: 190px; bottom: 60px; font-size: 46px; font-weight: 900; letter-spacing: 2px;
    color: var(--accent); text-shadow: 0 0 18px rgba(255,61,127,.6); }
  #onfoot { position: absolute; right: 190px; bottom: 56px; font-size: 20px; font-weight: 800; letter-spacing: 2px; opacity: .85; display: none; }

  #minimap { position: absolute; left: 22px; bottom: 22px; width: 180px; height: 180px; border-radius: 12px;
    background: rgba(8,10,20,.55); border: 1px solid rgba(255,255,255,.12); backdrop-filter: blur(6px); overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
  #minimap canvas { width: 100%; height: 100%; }

  #titlecard { position: absolute; left: 24px; top: 20px; padding: 12px 18px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(255,61,127,.22), rgba(80,120,255,.14));
    border: 1px solid rgba(255,255,255,.14); backdrop-filter: blur(8px); }

  #prompt { position: absolute; left: 50%; bottom: 120px; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 30px; font-size: 15px; font-weight: 700; letter-spacing: 1px;

    background: rgba(10,12,22,.55); border: 1px solid rgba(255,255,255,.12); transition: opacity .5s; }

  #loader { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    background: radial-gradient(circle at 50% 40%, #1a1030, #06060c 70%); color: #fff; transition: opacity .8s; }

  #loader .bar { width: 240px; height: 4px; border-radius: 3px; background: rgba(255,255,255,.14); overflow: hidden; }

<script>
// A module-level throw otherwise leaves the loading screen up forever with nothing in the
// console, so surface it on the loader itself.
window.addEventListener('error', e => {
  window.__err = (e.message||'') + ' @ ' + (e.filename||'').split('/').pop() + ':' + e.lineno + ':' + e.colno;
  const l = document.getElementById('loader'); if (!l) return;
  l.querySelector('h2').textContent = 'BUILD FAILED';
  const s = l.querySelector('small');
  s.textContent = window.__err; s.style.cssText = 'opacity:.9;letter-spacing:0;font-size:13px;color:#ff6b6b;max-width:80vw;text-align:center';
});
</script>

<script type="module">
import * as THREE from 'three';
import { Sky } from 'three/addons/objects/Sky.js';

import * as BGU from 'three/addons/utils/BufferGeometryUtils.js';

// Every crowd, vehicle and tree is drawn with InstancedMesh: one draw call per part
// for the whole city instead of one per object. `dummy` composes each instance matrix.
const dummy = new THREE.Object3D();
function instanced(geo, mat, count, shadow) {
  const m = new THREE.InstancedMesh(geo, mat, count);
  m.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  m.castShadow = shadow !== false; m.receiveShadow = shadow !== false;
  m.frustumCulled = false;
  return m;
}
// bake a mesh's local transform into geometry so parts can be merged into one buffer
function baked(geo, x, y, z, rx, ry, rz) {
  const g = geo.clone();
  dummy.position.set(x||0, y||0, z||0); dummy.rotation.set(rx||0, ry||0, rz||0);
  dummy.scale.set(1,1,1); dummy.updateMatrix();
  g.applyMatrix4(dummy.matrix); return g;
}

// =================================================================
//  RENDERER / SCENE / CAMERA
// =================================================================
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xc2dcf0, 0.00042);

const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.4, 7000);
camera.position.set(0, 12, 24);

// =================================================================
//  SKY + IMAGE-BASED LIGHTING
// =================================================================
const sun = new THREE.Vector3();
const sunElev = 62, sunAzim = 135;
sun.setFromSphericalCoords(1, THREE.MathUtils.degToRad(90 - sunElev), THREE.MathUtils.degToRad(sunAzim));

// gradient sky dome — reliable blue sky (Preetham washes white through the bloom/tonemap pipeline)
function makeSkyGradient() {
  const c = document.createElement('canvas'); c.width = 16; c.height = 256; const g = c.getContext('2d');
  const grd = g.createLinearGradient(0, 0, 0, 256);
  grd.addColorStop(0.00, '#2f6fca'); grd.addColorStop(0.34, '#4f92d6'); grd.addColorStop(0.50, '#8fc0e8');
  grd.addColorStop(0.62, '#c2dcf0'); grd.addColorStop(1.00, '#dbe9f4');
  g.fillStyle = grd; g.fillRect(0, 0, 16, 256);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}
const skyDome = new THREE.Mesh(new THREE.SphereGeometry(5000, 32, 16),
  new THREE.MeshBasicMaterial({ map: makeSkyGradient(), side: THREE.BackSide, fog: false, depthWrite: false }));
skyDome.renderOrder = -1; scene.add(skyDome);

// environment reflections sampled from the gradient dome
const pmrem = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();
envScene.add(new THREE.Mesh(new THREE.SphereGeometry(500, 24, 12), new THREE.MeshBasicMaterial({ map: makeSkyGradient(), side: THREE.BackSide })));
scene.environment = pmrem.fromScene(envScene).texture;

const hemi = new THREE.HemisphereLight(0xbcd8f5, 0x6a7a5a, 1.9);
scene.add(hemi);

const sunLight = new THREE.DirectionalLight(0xfff6e8, 3.6);
sunLight.position.copy(sun).multiplyScalar(220);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(4096, 4096);   // tighter frustum below + 4k map = crisp street shadows
const SH = 105;
sunLight.shadow.camera.left = -SH; sunLight.shadow.camera.right = SH;
sunLight.shadow.camera.top = SH;   sunLight.shadow.camera.bottom = -SH;
sunLight.shadow.camera.near = 1;   sunLight.shadow.camera.far = 600;
sunLight.shadow.bias = -0.0004;
sunLight.shadow.normalBias = 0.04;
scene.add(sunLight);
scene.add(sunLight.target);

// a glowing sun disc in the sky
function radialSprite(r,g,b, inner) {
  const c = document.createElement('canvas'); c.width = c.height = 128; const ctx = c.getContext('2d');
  const grd = ctx.createRadialGradient(64,64,0,64,64,64);
  grd.addColorStop(0, `rgba(${r},${g},${b},1)`); grd.addColorStop(inner||0.25, `rgba(${r},${g},${b},0.9)`); grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grd; ctx.fillRect(0,0,128,128); return new THREE.CanvasTexture(c);
}
const sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: radialSprite(255,244,210,0.16), transparent: true, depthWrite: false, fog: false, blending: THREE.AdditiveBlending }));
sunSprite.scale.set(340, 340, 1); scene.add(sunSprite);   // positioned each frame relative to the camera

// fluffy clouds that follow overhead and drift
function makeCloudTexture() {
  const c = document.createElement('canvas'); c.width = 256; c.height = 128; const g = c.getContext('2d');
  for (let i = 0; i < 34; i++) {
    const x = 40 + Math.random()*176, y = 50 + Math.random()*44, r = 14 + Math.random()*40;
    const grd = g.createRadialGradient(x, y-r*0.2, 0, x, y, r);
    grd.addColorStop(0, 'rgba(255,255,255,0.95)'); grd.addColorStop(0.5,'rgba(250,252,255,0.6)'); grd.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = grd; g.beginPath(); g.arc(x, y, r, 0, Math.PI*2); g.fill();
  }
  return new THREE.CanvasTexture(c);
}
const cloudTex = makeCloudTexture();
const clouds = [];
for (let i = 0; i < 40; i++) {
  const m = new THREE.SpriteMaterial({ map: cloudTex, color: new THREE.Color(1.9,1.95,2.05), transparent: true, opacity: 0.7 + Math.random()*0.25, depthWrite: false, fog: false });
  const s = new THREE.Sprite(m);
  s.userData = { ox: (Math.random()*2-1)*1500, oz: (Math.random()*2-1)*1500, oy: 320 + Math.random()*260 };
  const sc = 130 + Math.random()*180; s.scale.set(sc, sc*0.5, 1);
  scene.add(s); clouds.push(s);
}
let cloudDrift = 0;

// =================================================================
//  WORLD — real downtown Dallas geometry (OpenStreetMap)
// =================================================================
const DATA = window.DALLAS_DATA;
const colliders = [];      // static building AABBs
const mapBuildings = [];   // minimap footprints
function addCollider(x, z, w, d) {
  colliders.push({ minX: x - w/2, maxX: x + w/2, minZ: z - d/2, maxZ: z + d/2 });
  mapBuildings.push({ x, z, w, d });
}
const WORLD = { minX: DATA.bounds[0], maxX: DATA.bounds[1], minZ: DATA.bounds[2], maxZ: DATA.bounds[3] };
const HALF = Math.max(WORLD.maxX - WORLD.minX, WORLD.maxZ - WORLD.minZ) / 2 + 60;
const ROAD_POLYS = [], ROAD_SPOTS = [], SIGNAL_POS = DATA.signals;

// ground (large enough to reach the distant scenery)
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(11000, 11000),
  new THREE.MeshStandardMaterial({ color: 0x47603a, roughness: 1 })
);
ground.rotation.x = -Math.PI/2; ground.position.set((WORLD.minX+WORLD.maxX)/2, -0.03, (WORLD.minZ+WORLD.maxZ)/2);
ground.receiveShadow = true; scene.add(ground);

// Downtown blocks are hardscape, not lawn — surface parking, service yards and plazas fill
// the space between the buildings and the kerb. Without this the trimmed-back buildings
// leave the city sitting in a field.
function makeLotTex() {
  const S = 256, c = document.createElement('canvas'); c.width = c.height = S; const g = c.getContext('2d');
  g.fillStyle = '#5b5c5e'; g.fillRect(0,0,S,S);
  const img = g.getImageData(0,0,S,S), d = img.data;
  for (let i=0;i<d.length;i+=4){ const n=(Math.random()-0.5)*26; d[i]+=n; d[i+1]+=n; d[i+2]+=n; }
  g.putImageData(img,0,0);
  for (let i=0;i<10;i++){ g.fillStyle=`rgba(70,72,76,${0.10+Math.random()*0.16})`;
    g.fillRect(Math.random()*S, Math.random()*S, 30+Math.random()*90, 20+Math.random()*70); }
  g.strokeStyle='rgba(215,215,205,0.5)'; g.lineWidth=2;              // faded parking bays
  for (let i=0;i<S;i+=32){ g.beginPath(); g.moveTo(i,40); g.lineTo(i,110); g.stroke();
                           g.beginPath(); g.moveTo(i,150); g.lineTo(i,220); g.stroke(); }
  const t = new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.anisotropy = 16; t.colorSpace = THREE.SRGBColorSpace;
  t.repeat.set((WORLD.maxX-WORLD.minX)/26, (WORLD.maxZ-WORLD.minZ)/26); return t;
}
const cityGround = new THREE.Mesh(
  new THREE.PlaneGeometry(WORLD.maxX-WORLD.minX + 140, WORLD.maxZ-WORLD.minZ + 140),
  new THREE.MeshStandardMaterial({ map: makeLotTex(), roughness: 0.97 })
);
cityGround.rotation.x = -Math.PI/2;
cityGround.position.set((WORLD.minX+WORLD.maxX)/2, -0.012, (WORLD.minZ+WORLD.maxZ)/2);
cityGround.receiveShadow = true; scene.add(cityGround);

// ---- roads: wide asphalt + sidewalks, plus clearance corridors that set buildings back ----
const ROAD_HW = 9;                       // half-width kept clear of buildings (2 lanes + sidewalks)
const asphaltPos = [], walkPos = [], centerPos = [], crossPos = [];
const asphaltUV = [], walkUV = [], centerUV = [];
// Every real carriageway segment, kept so buildings can be clipped against the actual
// street rather than an axis-aligned approximation of it.
const roadSegs = [], pavedSegs = [];
// Segments bucketed into a 30 m grid so "is this point on tarmac?" is an exact
// perpendicular-distance test against a handful of candidates, not a quantised guess.
const SEGQ = 30, segGrid = new Map();
function indexPaved(s) {
  pavedSegs.push(s);
  const n = Math.max(1, Math.ceil(s.len/SEGQ));
  for (let i = 0; i <= n; i++) {
    const x = s.ax + (s.bx-s.ax)*i/n, z = s.az + (s.bz-s.az)*i/n;
    const k = Math.floor(x/SEGQ) + ',' + Math.floor(z/SEGQ);
    let b = segGrid.get(k); if (!b) segGrid.set(k, b = []);
    if (!b.includes(s)) b.push(s);
  }
}
function markPaved(ax, az, bx, bz, hw) {
  const len = Math.hypot(bx-ax, bz-az); if (len < 0.5) return;
  indexPaved({ ax, az, bx, bz, len, hw });
}
// `uv` is optional; uS/vS are how many metres one texture tile spans across / along the strip,
// and v0 lets a polyline carry its texture run on from the previous segment.
function quad(arr, ax, az, bx, bz, w, y, uv, uS, vS, v0) {
  const dx=bx-ax, dz=bz-az, len=Math.hypot(dx,dz)||1, nx=-dz/len*w/2, nz=dx/len*w/2;
  arr.push(ax+nx,y,az+nz, ax-nx,y,az-nz, bx-nx,y,bz-nz,  ax+nx,y,az+nz, bx-nx,y,bz-nz, bx+nx,y,bz+nz);
  if (uv) { const u = w/uS, v1 = v0 + len/vS;
    uv.push(0,v0, u,v0, u,v1,  0,v0, u,v1, 0,v1); }
  return len;
}
for (const r of DATA.roads) {
  // Carriageway follows the OSM road class, so an alley stays an alley. Building
  // clearance is derived from it — a 9 m setback off every service road was eating
  // the buildings that legitimately back onto one.
  const p = r.p; let total = 0;
  const aw = Math.min(13, Math.max(7, r.w)), clear = aw/2 + 2.5;
  let vA = 0, vW = 0, vC = 0;                             // texture run along this road
  for (let i = 0; i < p.length-1; i++) {
    const ax=p[i][0], az=p[i][1], bx=p[i+1][0], bz=p[i+1][1];
    const dx=bx-ax, dz=bz-az, len=Math.hypot(dx,dz)||1;
    quad(walkPos, ax, az, bx, bz, clear*2, 0.012, walkUV, 2.2, 2.2, vW);      // sidewalk strip
    quad(asphaltPos, ax, az, bx, bz, aw, 0.03, asphaltUV, 9, 9, vA);          // asphalt (2 lanes)
    quad(centerPos, ax, az, bx, bz, 0.9, 0.05, centerUV, 0.9, 6, vC);         // double-yellow centre
    vW += len/2.2; vA += len/9; vC += len/6;
    total += len;
    if (len > 1) { roadSegs.push({ ax, az, bx, bz, len, clear }); markPaved(ax, az, bx, bz, aw/2); }
    const ang=Math.atan2(dx,dz), off=aw/2 + 1.25;          // middle of the sidewalk
    for (let d = 8; d < len-4; d += 22) { const t=d/len, cx=ax+dx*t, cz=az+dz*t, nnx=-dz/len, nnz=dx/len, s=Math.random()<0.5?1:-1;
      ROAD_SPOTS.push({ x:cx+nnx*off*s, z:cz+nnz*off*s, ang }); }
  }
  if (total > 40 && r.w >= 8) ROAD_POLYS.push(p);
}
// ---- convex clipping: trims a building back off whatever street it overlaps ----
// Starting from the footprint's rectangle and cutting with half-planes keeps the result
// convex, which is what makes both the extrusion and the collision below simple. A street
// that crosses at an angle leaves an angled corner rather than a square notch.
function clipHalf(poly, px, pz, nx, nz) {          // keep the side where dot(V-P, N) >= 0
  const out = [];
  for (let i = 0; i < poly.length; i++) {
    const a = poly[i], b = poly[(i+1) % poly.length];
    const da = (a[0]-px)*nx + (a[1]-pz)*nz, db = (b[0]-px)*nx + (b[1]-pz)*nz;
    if (da >= 0) out.push(a);
    if ((da >= 0) !== (db >= 0)) { const t = da/(da-db);
      out.push([a[0] + (b[0]-a[0])*t, a[1] + (b[1]-a[1])*t]); }
  }
  return out;
}
// exact "is this point on a carriageway?" test, used to audit street furniture
function onRoad(x, z, margin) {
  const gx = Math.floor(x/SEGQ), gz = Math.floor(z/SEGQ);
  for (let ox = -1; ox <= 1; ox++) for (let oz = -1; oz <= 1; oz++) {
    const b = segGrid.get((gx+ox) + ',' + (gz+oz)); if (!b) continue;
    for (const s of b) if (segInfo(x, z, s).d < s.hw + (margin||0)) return true;
  }
  return false;
}
// Monotone-chain hull of the real footprint. Tighter than a bounding box (so far fewer
// buildings are wrongly judged to be sitting on a street) and convex, which is what lets

  else if (def.type==='punched') { cols=6; rows=6; litChance=0.07; pxF=0.30; pyF=0.26; }  // small windows, lots of wall

// =================================================================
//  ROAD NETWORK GRAPH
//  Nodes sit where ways meet; edges are the drivable segments between
//  them. Traffic walks this graph and chooses a turn at each junction
//  instead of ping-ponging along one polyline.
// =================================================================
const NET = { nodes: [], edges: [], main: [] };
{
  const key = new Map(), Q = 1.2;                    // 1.2 m quantisation joins ways that share an endpoint
  const nodeAt = (x, z) => {
    const k = Math.round(x/Q) + ',' + Math.round(z/Q);
    let i = key.get(k);
    if (i === undefined) { i = NET.nodes.length; NET.nodes.push({ x, z, e: [], sig: -1 }); key.set(k, i); }
    return i;
  };
  const addEdge = (ax, az, bx, bz, spdMul, sw) => {
    const len = Math.hypot(bx-ax, bz-az); if (len < 2) return;
    const a = nodeAt(ax, az), b = nodeAt(bx, bz); if (a === b) return;
    const i = NET.edges.length;
    // `sw` is the distance from the centreline to the middle of the sidewalk — pedestrians
    // walk on it, so it has to match the width this particular street was drawn at
    NET.edges.push({ a, b, len, spdMul, sw, axis: Math.abs(bx-ax) >= Math.abs(bz-az) ? 'EW' : 'NS' });
    NET.nodes[a].e.push(i); NET.nodes[b].e.push(i);
  };
  for (const r of DATA.roads) {
    if (r.t === 'service') continue;                 // alleys and parking aisles aren't worth driving
    const sw = Math.min(13, Math.max(7, r.w))/2 + 1.25;
    for (let i = 0; i < r.p.length-1; i++) addEdge(r.p[i][0], r.p[i][1], r.p[i+1][0], r.p[i+1][1], 1, sw);
  }
  for (let i = 0; i < ringPts.length; i++) {         // the ring closes on itself, so highway traffic loops
    const a = ringPts[i], b = ringPts[(i+1)%ringPts.length];
    addEdge(a[0], a[1], b[0], b[1], 2.0, 14);
  }
  for (const c of conSegs) addEdge(c[0], c[1], c[2], c[3], 1.5, 9);

  // keep only the biggest connected component so nobody spawns on an island
  const comp = new Int32Array(NET.nodes.length).fill(-1);
  let bestC = -1, bestN = 0, c = 0;
  for (let s = 0; s < NET.nodes.length; s++) {
    if (comp[s] >= 0) continue;
    const stack = [s]; comp[s] = c; let n = 0;
    while (stack.length) {
      const v = stack.pop(); n++;
      for (const ei of NET.nodes[v].e) { const e = NET.edges[ei], o = e.a === v ? e.b : e.a;
        if (comp[o] < 0) { comp[o] = c; stack.push(o); } }
    }
    if (n > bestN) { bestN = n; bestC = c; }
    c++;
  }
  for (let i = 0; i < NET.edges.length; i++) if (comp[NET.edges[i].a] === bestC) NET.main.push(i);
}

// direction of travel when leaving `from` along edge `e`
function edgeDir(e, from) {
  const a = NET.nodes[from], to = e.a === from ? e.b : e.a, b = NET.nodes[to];
  const dx = b.x-a.x, dz = b.z-a.z, l = Math.hypot(dx,dz) || 1;
  return { dx: dx/l, dz: dz/l, to };
}
// at a junction, carry straight on where possible; never U-turn unless it's a dead end
function pickNextEdge(node, curEdge, dx, dz) {
  const cand = []; let sum = 0;
  for (const ei of NET.nodes[node].e) {
    if (ei === curEdge) continue;
    const d = edgeDir(NET.edges[ei], node);
    const dot = d.dx*dx + d.dz*dz;
    if (dot < -0.5) continue;
    const w = Math.pow(dot + 1.05, 4);
    cand.push({ ei, w }); sum += w;
  }
  if (!cand.length) return curEdge;                  // dead end — the only way out is back
  let r = Math.random()*sum;
  for (const c of cand) { r -= c.w; if (r <= 0) return c.ei; }
  return cand[cand.length-1].ei;
}

{

    for (let i=0;i<=n;i++){ const px=ax+(bx-ax)*i/n, pz=az+(bz-az)*i/n;
      for (let o=-hw;o<=hw;o+=CQ) mark(px+ux*o, pz+uz*o); }

      t.z = THREE.MathUtils.clamp(t.z + t.vz*dt, -HALF-40, HALF+40);

      if (t.knock <= 0) rejoinNetwork(t);

// ---- sidewalk navigation --------------------------------------------------------
// People walk lanes offset to one side of a street edge — never on the carriageway. At a
// junction they round the corner onto the next street, and where a crossing is painted they
// may step out and cross, waiting for the signal to stop the traffic they're walking into.
const PED_EDGES = NET.main.filter(ei => NET.edges[ei].spdMul === 1);
const PED_CORE = PED_EDGES.filter(ei => {
  const a = NET.nodes[NET.edges[ei].a];

const NODEQ = 45, nodeGrid = new Map();
for (let i = 0; i < NET.nodes.length; i++) {
  const n = NET.nodes[i], k = Math.floor(n.x/NODEQ) + ',' + Math.floor(n.z/NODEQ);
  let b = nodeGrid.get(k); if (!b) nodeGrid.set(k, b = []); b.push(i);
}

function nearestNode(x, z) {

    const gx = Math.floor(x/NODEQ), gz = Math.floor(z/NODEQ);
    for (let ox = -ring; ox <= ring; ox++) for (let oz = -ring; oz <= ring; oz++) {
      const b = nodeGrid.get((gx+ox) + ',' + (gz+oz)); if (!b) continue;
      for (const i of b) {
        if (!NET.nodes[i].e.length) continue;
        const d = (NET.nodes[i].x-x)**2 + (NET.nodes[i].z-z)**2;
        if (d < bd) { bd = d; best = i; }

}
function nearestNodeWithStreet(x, z) {
  let best = -1, bd = Infinity;

    const gx = Math.floor(x/NODEQ), gz = Math.floor(z/NODEQ);
    for (let ox = -ring; ox <= ring; ox++) for (let oz = -ring; oz <= ring; oz++) {
      const b = nodeGrid.get((gx+ox) + ',' + (gz+oz)); if (!b) continue;
      for (const i of b) {
        if (!NET.nodes[i].e.some(ei => NET.edges[ei].spdMul === 1)) continue;
        const d = (NET.nodes[i].x-x)**2 + (NET.nodes[i].z-z)**2;

}

  p.g.position.z = A.z + d.dz*p.dist + d.dx*p.side*e.sw;

function nextPedEdge(node, curEdge, dx, dz) {

    const d = edgeDir(NET.edges[ei], node);

function updatePeds(dt) {

      p.flee.t -= dt;

      if (res.hit) { const ang = Math.atan2(p.flee.dx, p.flee.dz) + (Math.random()<0.5?1:-1)*1.1; p.flee.dx = Math.sin(ang); p.flee.dz = Math.cos(ang); }

      const c = p.cross;

      p.g.position.z = c.z0 + (c.z1-c.z0)*c.t;

//  RAGDOLL PHYSICS  (people react when a vehicle hits them)
// =================================================================
const playerRag = makeRag();
function applyRagdoll(g, rag, dx, dz, speed) {

  const s = Math.min(Math.abs(speed), 45);
  const horiz = 0.3 + s * 0.13, vert = 1.1 + s * 0.14;     // small ding = gentle; fast = launched
  const len = Math.hypot(dx, dz) || 1;
  rag.vel.set(dx/len*horiz + (Math.random()-0.5), vert, dz/len*horiz + (Math.random()-0.5));
  rag.spin.set((Math.random()-0.5)*(1+s*0.25), (Math.random()-0.5)*(0.6+s*0.12), (Math.random()-0.5)*(1+s*0.25));
}
function updateRag(g, rag, dt) {
  rag.vel.y -= 26 * dt;
  g.position.x += rag.vel.x * dt; g.position.y += rag.vel.y * dt; g.position.z += rag.vel.z * dt;
  g.rotation.x += rag.spin.x * dt; g.rotation.y += rag.spin.y * dt; g.rotation.z += rag.spin.z * dt;
  if (g.position.y <= 0.3) {                                // hit the ground, bounce + friction
    g.position.y = 0.3;
    if (rag.vel.y < 0) rag.vel.y *= -0.35;
    rag.vel.x *= 0.7; rag.vel.z *= 0.7; rag.spin.multiplyScalar(0.55); rag.down = true;
    if (rag.vel.lengthSq() < 1.6 && (Math.abs(rag.spin.x)+Math.abs(rag.spin.z)) < 0.7) rag.settle += dt;
  }

  const fl = Math.min(1.4, rag.vel.length()*0.35);
  ud.legL.rotation.x = Math.sin(g.position.x*4)*fl; ud.legR.rotation.x = -Math.sin(g.position.z*4)*fl;
  ud.armL.rotation.x = -1.1*fl; ud.armR.rotation.x = 1.0*fl; ud.armL.rotation.z = 0.5*fl; ud.armR.rotation.z = -0.5*fl;
  g.position.x = THREE.MathUtils.clamp(g.position.x, -HALF-40, HALF+40);
  g.position.z = THREE.MathUtils.clamp(g.position.z, -HALF-40, HALF+40);

    const k = Math.min(1, dt*3);

    if (Math.abs(g.rotation.x) < 0.06 && Math.abs(g.rotation.z) < 0.06 && g.position.y < 0.06) {
      rag.active = false; g.rotation.x = 0; g.rotation.z = 0; g.position.y = 0;
      // assign components directly: crowd avatars are plain objects, not THREE.Euler
      ud.armL.rotation.x = 0; ud.armL.rotation.z = 0;
      ud.armR.rotation.x = 0; ud.armR.rotation.z = 0;

  // moving car swept all 2,600 pedestrians — over a million checks a frame before any crash.
  const gx = Math.floor(x/GAP_Q), gz = Math.floor(z/GAP_Q);
  for (let ox = -1; ox <= 1; ox++) for (let oz = -1; oz <= 1; oz++) {
    const b = pedGrid.get((gx+ox) + ',' + (gz+oz)); if (!b) continue;

// =================================================================
//  CAR PHYSICS
// =================================================================
car.position.copy(CAR_START);
let heading = SPAWN.heading, speed = 0, steerAngle = 0, drift = 0, steerSmoothed = 0;
const MAX_SPEED = 45, MAX_REVERSE = -16, ACCEL = 34, BRAKE = 72, ENGINE_DRAG = 13;
let skidT = 0, exhaustT = 0, carHealth = 100, smokeT = 0;
function damageCar(n) { carHealth = Math.max(0, carHealth - n); if (carHealth <= 0) explode(); }
function explode() {
  for (let i = 0; i < 22; i++) emitParticle(new THREE.Vector3(car.position.x, 1, car.position.z),
    new THREE.Vector3((Math.random()-0.5)*15, 3+Math.random()*10, (Math.random()-0.5)*15), i < 11 ? 0xffaa33 : 0x1a1a1a, 1.2+Math.random()*1.6, 0.9, 4);
  shake = 2.1;
  carHealth = 100;
  car.position.copy(CAR_START); heading = SPAWN.heading; speed = 0; car.rotation.set(0, SPAWN.heading, 0); camYaw = SPAWN.heading;
}

function collideCircle(px, pz, r, list) {
  let x = px, z = pz, hit = false;
  for (const b of list) {
    if (!(x + r > b.minX && x - r < b.maxX && z + r > b.minZ && z - r < b.maxZ)) continue;   // broad phase
    if (b.edges) {
      // convex prism: the least-penetrating edge is the one to slide out along
      let bestD = -Infinity, bnx = 0, bnz = 0, sep = false;
      for (const e of b.edges) {
        const d = (x-e.ax)*e.nx + (z-e.az)*e.nz;
        if (d > r) { sep = true; break; }
        if (d > bestD) { bestD = d; bnx = e.nx; bnz = e.nz; }
      }
      if (sep) continue;
      x += bnx*(r-bestD); z += bnz*(r-bestD); hit = true;
    } else {
      const oL = (x+r)-b.minX, oR = b.maxX-(x-r), oT = (z+r)-b.minZ, oB = b.maxZ-(z-r);
      const m = Math.min(oL,oR,oT,oB);
      if (m===oL) x = b.minX-r; else if (m===oR) x = b.maxX+r; else if (m===oT) z = b.minZ-r; else z = b.maxZ+r;
      hit = true;
    }
  }
  return { x, z, hit };
}

// resolve a circle against every traffic car (oriented AABB matching the car body)
function collideTraffic(px, pz, r) {
  let x = px, z = pz, hit = false, who = -1;
  for (let i = 0; i < traffic.length; i++) {
    const t = traffic[i];
    const halfX = 1.9, halfZ = 1.9;
    const minX = t.x - halfX, maxX = t.x + halfX;
    const minZ = t.z - halfZ, maxZ = t.z + halfZ;
    if (x + r > minX && x - r < maxX && z + r > minZ && z - r < maxZ) {
      const oL = (x+r)-minX, oR = maxX-(x-r), oT = (z+r)-minZ, oB = maxZ-(z-r);
      const m = Math.min(oL, oR, oT, oB);
      if (m===oL) x = minX-r; else if (m===oR) x = maxX+r; else if (m===oT) z = minZ-r; else z = maxZ+r;
      hit = true; who = i;
    }
  }
  return { x, z, hit, who };
}

function updateCar(dt) {
  const driving = mode === 'car';
  const throttle = driving && (keys.KeyW || keys.ArrowUp) ? 1 : 0;
  const braking  = driving && (keys.KeyS || keys.ArrowDown) ? 1 : 0;
  const left  = driving && (keys.KeyA || keys.ArrowLeft) ? 1 : 0;
  const right = driving && (keys.KeyD || keys.ArrowRight) ? 1 : 0;
  const handbrake = driving && keys.Space ? 1 : 0;

  if (throttle) speed += ACCEL * dt;
  else if (braking) { if (speed > 0) speed -= BRAKE*dt; else speed -= ACCEL*0.6*dt; }
  else { if (speed > 0) speed = Math.max(0, speed - ENGINE_DRAG*dt); else if (speed < 0) speed = Math.min(0, speed + ENGINE_DRAG*dt); }
  speed = THREE.MathUtils.clamp(speed, MAX_REVERSE, MAX_SPEED);
  if (handbrake) speed *= (1 - 1.6*dt);

  const steerInput = right - left;
  steerSmoothed += (steerInput - steerSmoothed) * Math.min(1, dt*5);      // ease steering in/out
  const speedFrac = Math.abs(speed) / MAX_SPEED;
  const authority = 1.35 * (1 - speedFrac*0.62);                          // looser overall, gentler at speed
  const dir = speed >= 0 ? 1 : -1;
  const turn = steerSmoothed * authority * (Math.min(Math.abs(speed),18)/18) * dir;
  heading -= turn * dt;                                                   // right key -> car turns right
  steerAngle += ((-steerSmoothed*0.5) - steerAngle) * Math.min(1, dt*8);  // front wheels point toward steer input
  const targetDrift = (handbrake && Math.abs(speed) > 16 && steerInput) ? 1 : 0;
  drift += (targetDrift - drift) * Math.min(1, dt*5);

  const fx = Math.sin(heading), fz = Math.cos(heading);
  let nx = car.position.x + fx*speed*dt, nz = car.position.z + fz*speed*dt;

  let res = collideCircle(nx, nz, 1.6, colliders);
  if (res.hit) { if (Math.abs(speed) > 12) { damageCar(Math.abs(speed)*0.35); shake = Math.min(1.2, shake + 0.2); } speed *= 0.35; }
  const rt = collideTraffic(res.x, res.z, 1.5);
  if (rt.hit && rt.who >= 0) {
    const other = traffic[rt.who];
    const impact = Math.abs(speed);
    if (impact > 3) {                                      // real hit — knock the other car loose
      const px = fz, pz = -fx;                             // sideways scatter axis
      const side = Math.random() - 0.5;
      // `other.yaw` is already the car's heading — it used to be read back off a per-car
      // mesh that no longer exists, which threw and killed the frame loop on every crash.
      other.vx = fx*impact*0.95 + px*side*impact*0.6;
      other.vz = fz*impact*0.95 + pz*side*impact*0.6;
      other.spin = (Math.random()-0.5) * impact * 0.14;
      other.knock = Math.min(2.4, 0.5 + impact*0.055);
      speed *= impact > 28 ? 0.2 : 0.5;                    // player recoils, harder at speed
      if (!other.hitCooldown || other.hitCooldown <= 0) { addScore(60); addHeat(6); other.hitCooldown = 1.2; }
      damageCar(impact*0.5);
      shake = Math.min(1.6, shake + 0.4 + impact*0.02);
    } else { speed *= 0.6; other.bump = 0.4; }             // gentle nudge, no score
  }
  car.position.x = THREE.MathUtils.clamp(rt.x, -HALF-40, HALF+40);
  car.position.z = THREE.MathUtils.clamp(rt.z, -HALF-40, HALF+40);

  // plow through pedestrians (ragdoll scales with speed)
  // sweep the whole car body (front, middle, rear) so nothing slips through
  const dsgn = speed >= 0 ? 1 : -1;
  for (const off of [2.0, 0.4, -1.6]) {
    const hx = car.position.x + fx*off, hz = car.position.z + fz*off;
    if (Math.abs(speed) > 1) hitPeopleAt(hx, hz, fx*dsgn, fz*dsgn, speed, 1.9, true);
    if (Math.abs(speed) > 2) hitPropsAt(hx, hz, fx*dsgn, fz*dsgn, speed, 1.9);
  }

  car.rotation.y = heading + drift*0.5*steerInput;
  const targetRoll = -steerInput * speedFrac * 0.09;
  carRig.lean.rotation.z += (targetRoll - carRig.lean.rotation.z) * Math.min(1, dt*6);

  const spin = speed*dt/0.55;
  for (const wl of carRig.wheels) { wl.grp.rotation.y = wl.steer ? steerAngle : 0; wl.w.rotation.x += spin; }
  const brakeGlow = braking ? 3.5 : 1.2;
  for (const t of carRig.tailMeshes) t.material.emissiveIntensity = brakeGlow;

  // contact shadow
  carShadow.position.set(car.position.x, 0.045, car.position.z);
  carShadow.rotation.z = -heading;

  // skid marks while drifting / hard braking at speed
  const skidding = (drift > 0.4 || (braking && Math.abs(speed) > 26)) && Math.abs(speed) > 8;
  skidT -= dt;
  if (skidding && skidT <= 0) {
    skidT = 0.02;
    const rx = Math.cos(heading), rz = -Math.sin(heading);   // car right axis (approx)
    dropSkid(car.position.x - fx*1.6 - rx*0.9, car.position.z - fz*1.6 - rz*0.9);
    dropSkid(car.position.x - fx*1.6 + rx*0.9, car.position.z - fz*1.6 + rz*0.9);
    if (Math.abs(speed) > 14) {
      emitParticle(new THREE.Vector3(car.position.x - fx*1.8, 0.4, car.position.z - fz*1.8),
        new THREE.Vector3((Math.random()-0.5)*2, 1.2, (Math.random()-0.5)*2), 0xdddddd, 1.4, 0.9, 3.5);
    }
  }
  // damage smoke — grey when banged up, black + flames when critical
  if (carHealth < 55) {
    smokeT -= dt;
    if (smokeT <= 0) {
      smokeT = carHealth < 25 ? 0.05 : 0.13;
      const crit = carHealth < 25;
      const col = crit ? (Math.random() < 0.35 ? 0xff6a22 : 0x141414) : 0x8a8a8a;
      emitParticle(new THREE.Vector3(car.position.x + fx*1.5, 1.0, car.position.z + fz*1.5),
        new THREE.Vector3((Math.random()-0.5)*1.6, 2+Math.random()*2.5, (Math.random()-0.5)*1.6), col, crit?1.0:0.8, 1.2, crit?3:2.4);
    }
  }
  // exhaust when accelerating; dust when off the tarmac
  exhaustT -= dt;
  if (exhaustT <= 0 && Math.abs(speed) > 2) {
    exhaustT = 0.06;
    const offRoad = Math.abs(car.position.x) > HALF || Math.abs(car.position.z) > HALF;
    emitParticle(new THREE.Vector3(car.position.x - fx*2.2 + (Math.random()-0.5)*0.5, 0.5, car.position.z - fz*2.2 + (Math.random()-0.5)*0.5),
      new THREE.Vector3((Math.random()-0.5)*1.2, 0.9 + (offRoad?1:0), (Math.random()-0.5)*1.2),
      offRoad ? 0xbfa06a : 0x555a63, offRoad ? 1.4 : 0.7, offRoad ? 0.8 : 0.55, offRoad ? 3 : 1.6);
  }
}

// =================================================================
//  PLAYER (foot) PHYSICS
// =================================================================
const GRAV = 26, PLAYER_SPEED = 7, SPRINT = 12, JUMP = 9;
function updatePlayer(dt) {
  if (mode !== 'foot') return;
  if (playerRag.active) {                     // knocked down — tumble, then get back up
    updateRag(player, playerRag, dt);
    playerShadow.position.set(player.position.x, 0.045, player.position.z);
    return;
  }
  const fwd = (keys.KeyW || keys.ArrowUp) ? 1 : 0, back = (keys.KeyS || keys.ArrowDown) ? 1 : 0;
  const turnL = (keys.KeyA || keys.ArrowLeft) ? 1 : 0, turnR = (keys.KeyD || keys.ArrowRight) ? 1 : 0;
  const sprint = keys.ShiftLeft || keys.ShiftRight;

  // Tank controls: A/D turn the character in place; W/S walk along the way it faces.
  player.rotation.y += (turnL - turnR) * 2.8 * dt;
  const drive = fwd - back;
  const spd = sprint ? SPRINT : PLAYER_SPEED;
  const facingX = Math.sin(player.rotation.y), facingZ = Math.cos(player.rotation.y);
  let nx = player.position.x + facingX * drive * spd * dt;
  let nz = player.position.z + facingZ * drive * spd * dt;
  const moving = drive !== 0 || turnL || turnR;
  const res = collideCircle(nx, nz, 0.7, colliders);
  const rt = collideTraffic(res.x, res.z, 0.7);
  player.position.x = THREE.MathUtils.clamp(rt.x, -HALF-40, HALF+40);
  player.position.z = THREE.MathUtils.clamp(rt.z, -HALF-40, HALF+40);

  // jump / gravity
  if (keys.Space && playerOnGround) { playerVel.y = JUMP; playerOnGround = false; }
  playerVel.y -= GRAV * dt;
  player.position.y += playerVel.y * dt;
  if (player.position.y <= 0) { player.position.y = 0; playerVel.y = 0; playerOnGround = true; }

  const ud = player.userData; ud.phase += dt * (sprint ? 13 : 9) * (moving ? 1 : 0);
  const sw = Math.sin(ud.phase) * (moving ? 0.6 : 0);
  ud.legL.rotation.x = sw; ud.legR.rotation.x = -sw; ud.armL.rotation.x = -sw; ud.armR.rotation.x = sw;

  playerShadow.position.set(player.position.x, 0.045, player.position.z);
  if (drive !== 0) hitPropsAt(player.position.x, player.position.z, facingX*drive, facingZ*drive, spd*0.5, 0.9, 1.5);
}

let POLICE_ENABLED = false;    // temporarily muted while we build out the city (code kept)
let heat = 0, wanted = 0, bustTimer = 0, lastCopSpawn = 0;
const cops = [];
function addHeat(n) { heat = Math.min(180, heat + n); }
function buildPolice() {
  const veh = buildVehicle('sedan', 0x14151d);
  const bar = new THREE.Mesh(new THREE.BoxGeometry(1.0,0.14,0.3), new THREE.MeshStandardMaterial({ color:0x0a0a0a, roughness:0.5 }));
  bar.position.set(0,1.55,-0.1); veh.lean.add(bar);
  const red = new THREE.Mesh(new THREE.BoxGeometry(0.42,0.16,0.28), new THREE.MeshStandardMaterial({ color:0xff2222, emissive:0xff0000, emissiveIntensity:3 }));
  red.position.set(-0.28,1.55,-0.1); veh.lean.add(red);
  const blue = new THREE.Mesh(new THREE.BoxGeometry(0.42,0.16,0.28), new THREE.MeshStandardMaterial({ color:0x2244ff, emissive:0x0033ff, emissiveIntensity:3 }));
  blue.position.set(0.28,1.55,-0.1); veh.lean.add(blue);
  for (const sx of [-1,1]) { const door = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.5,1.4), new THREE.MeshStandardMaterial({ color:0xe8e8ee, roughness:0.5 })); door.position.set(sx*1.01,0.6,0); veh.lean.add(door); }
  return { veh, red, blue };
}
function spawnCop() {
  const b = buildPolice(); scene.add(b.veh.root);
  const t = mode === 'car' ? car.position : player.position;
  const ang = Math.random()*Math.PI*2, dist = 70 + Math.random()*40;
  const x = THREE.MathUtils.clamp(t.x + Math.cos(ang)*dist, -HALF, HALF);
  const z = THREE.MathUtils.clamp(t.z + Math.sin(ang)*dist, -HALF, HALF);
  const cop = { root:b.veh.root, red:b.red, blue:b.blue, x, z, heading:0, speed:12, shadow:makeContactShadow(5.4) };
  cop.root.position.set(x, 0, z);
  cops.push(cop);
}
function clearCops() { for (const c of cops) { scene.remove(c.root); scene.remove(c.shadow); } cops.length = 0; }
function bust() {
  bustTimer = 0; heat = 0; wanted = 0; clearCops();
  score = Math.floor(score * 0.75); carHealth = 100;
  mode = 'car'; player.visible = false; playerRag.active = false;
  car.position.copy(CAR_START); heading = SPAWN.heading; speed = 0; car.rotation.set(0, SPAWN.heading, 0); camYaw = SPAWN.heading;
  document.getElementById('gear').style.display = 'block';
  document.getElementById('onfoot').style.display = 'none';
  document.getElementById('crosshair').style.display = 'none';
  const o = document.getElementById('busted'); o.style.opacity = '1'; setTimeout(() => o.style.opacity = '0', 1500);
}
function updatePolice(dt, now) {
  if (!POLICE_ENABLED) { if (cops.length) clearCops(); heat = 0; wanted = 0; return; }
  heat = Math.max(0, heat - dt*(cops.length ? 1.4 : 3));
  wanted = heat <= 1 ? 0 : heat < 18 ? 1 : heat < 40 ? 2 : heat < 70 ? 3 : heat < 105 ? 4 : 5;
  const desired = wanted === 0 ? 0 : Math.min(6, wanted + (wanted >= 3 ? 1 : 0));
  if (cops.length < desired && now - lastCopSpawn > 1400) { spawnCop(); lastCopSpawn = now; }
  if (wanted === 0 && cops.length) clearCops();

  const target = mode === 'car' ? car.position : player.position;
  let nearSlow = false;
  for (let i = cops.length - 1; i >= 0; i--) {
    const c = cops[i];
    const dx = target.x - c.x, dz = target.z - c.z, dist = Math.hypot(dx, dz);
    const tHeading = Math.atan2(dx, dz);
    let d = ((tHeading - c.heading + Math.PI) % (Math.PI*2)) - Math.PI; if (d < -Math.PI) d += Math.PI*2;
    c.heading += THREE.MathUtils.clamp(d, -2.6*dt, 2.6*dt);
    const tSpeed = dist > 9 ? 36 : (dist > 4 ? 14 : 3);
    c.speed += (tSpeed - c.speed) * Math.min(1, dt*2);
    const fx = Math.sin(c.heading), fz = Math.cos(c.heading);
    const res = collideCircle(c.x + fx*c.speed*dt, c.z + fz*c.speed*dt, 1.6, colliders);
    if (res.hit) c.speed *= 0.55;
    c.x = THREE.MathUtils.clamp(res.x, -HALF-30, HALF+30);
    c.z = THREE.MathUtils.clamp(res.z, -HALF-30, HALF+30);
    c.root.position.set(c.x, 0, c.z); c.root.rotation.y = c.heading;
    c.shadow.position.set(c.x, 0.04, c.z); c.shadow.rotation.z = c.heading;
    const on = (Math.floor(now/160) % 2) === 0;                    // flashing light bar
    c.red.material.emissiveIntensity = on ? 4 : 0.15;
    c.blue.material.emissiveIntensity = on ? 0.15 : 4;
    if (dist < 3.4 && mode === 'car' && Math.abs(speed) > 22) {     // ram a cruiser at speed = wrecked
      for (let k = 0; k < 10; k++) emitParticle(new THREE.Vector3(c.x, 1, c.z),
        new THREE.Vector3((Math.random()-0.5)*10, 3+Math.random()*6, (Math.random()-0.5)*10), 0xff8844, 1+Math.random(), 0.6, 3);
      scene.remove(c.root); scene.remove(c.shadow); cops.splice(i, 1);
      addScore(300); addHeat(25); shake = Math.min(1.8, shake + 0.8); speed *= 0.5;
      continue;
    }
    if (dist < 3.2 && mode === 'car') damageCar(11*dt);          // cruisers ram you
    if (dist < 4.6 && (mode === 'foot' || Math.abs(speed) < 6)) nearSlow = true;
  }
  if (wanted > 0 && nearSlow) bustTimer += dt; else bustTimer = Math.max(0, bustTimer - dt*1.5);
  if (bustTimer > 2.6) bust();
}

// =================================================================
//  CAMERA
// =================================================================
function lerpAngle(a, b, t) { let d = ((b - a + Math.PI) % (Math.PI*2)) - Math.PI; if (d < -Math.PI) d += Math.PI*2; return a + d * t; }
const camTarget = new THREE.Vector3(), desired = new THREE.Vector3();
function updateCamera(dt, now) {
  const inCar = mode === 'car';
  const subject = inCar ? car.position : player.position;
  const eye = inCar ? 1.5 : 1.6;
  let dist = (inCar ? carDists : footDists)[camDistIdx];
  dist += Math.abs(speed)/MAX_SPEED * 2.2 * (inCar ? 1 : 0);

  // auto-recenter behind car when cruising and mouse is idle
  if (inCar && Math.abs(speed) > 3 && now - lastMouseMove > 1200)
    camYaw = lerpAngle(camYaw, heading, 1 - Math.exp(-dt * 2.2));

  const cp = Math.cos(camPitch), sp = Math.sin(camPitch);
  const dx = Math.sin(camYaw)*cp, dy = sp, dz = Math.cos(camYaw)*cp;
  desired.set(subject.x - dx*dist, subject.y + eye - dy*dist, subject.z - dz*dist);
  if (desired.y < 0.6) desired.y = 0.6;
  camera.position.lerp(desired, Math.min(1, dt * 9));
  if (shake > 0) {                                         // impact shake
    shake = Math.max(0, shake - dt*2.6);
    const sh = shake*0.6;
    camera.position.x += (Math.random()-0.5)*sh; camera.position.y += (Math.random()-0.5)*sh; camera.position.z += (Math.random()-0.5)*sh;
  }
  camTarget.set(subject.x + dx*2, subject.y + eye + dy*2, subject.z + dz*2);
  camera.lookAt(camTarget);

  const sfrac = Math.abs(speed)/MAX_SPEED;
  const targetFov = 62 + (inCar ? sfrac*12 + (keys.Space?4:0) : 0);
  camera.fov += (targetFov - camera.fov) * Math.min(1, dt*4);
  camera.updateProjectionMatrix();
}
function updateShadowCam() {
  const s = mode === 'car' ? car.position : player.position;
  sunLight.position.copy(sun).multiplyScalar(220).add(s);
  sunLight.target.position.copy(s);
}

// =================================================================
//  HUD / MINIMAP / PROMPT
// =================================================================
const speedEl = document.querySelector('#speedo .val');
const scoreEl = document.getElementById('score');
const wantedEl = document.getElementById('wanted');
const healthBar = document.querySelector('#health i');
const promptEl = document.getElementById('prompt');
const ctrlEl = document.getElementById('controls');
const mm = document.querySelector('#minimap canvas').getContext('2d');
function updateHUD() {
  const mph = Math.round(Math.abs(speed) * 1.6);
  speedEl.textContent = mode === 'car' ? mph : '—';

  scoreEl.textContent = '$' + score.toLocaleString();
  scoreEl.style.transform = `scale(${1 + scoreFlash*0.35})`;
  scoreEl.style.color = scoreFlash > 0.5 ? '#d6ffb0' : '#7CFC70';
  scoreFlash = Math.max(0, scoreFlash - 0.09);

  if (wanted > 0) { wantedEl.style.display = 'block'; wantedEl.textContent = '★'.repeat(wanted) + '☆'.repeat(5 - wanted); }
  else wantedEl.style.display = 'none';

  healthBar.style.width = carHealth + '%';
  healthBar.style.background = carHealth > 50 ? '#5bd75b' : carHealth > 20 ? '#ffd23b' : '#ff4b4b';

  if (mode === 'foot' && !playerRag.active) {
    if (findCarjackTarget()) { promptEl.style.display = 'block'; promptEl.innerHTML = 'Press <b>F</b> to carjack'; }
    else if (car.position.distanceTo(player.position) < 6) { promptEl.style.display = 'block'; promptEl.innerHTML = 'Press <b>F</b> to enter car'; }
    else promptEl.style.display = 'none';
  } else promptEl.style.display = 'none';

  const w = 180, viewR = 300, scale = (w/2) / viewR;   // player-centered local map
  const px0 = mode==='car' ? car.position.x : player.position.x;
  const pz0 = mode==='car' ? car.position.z : player.position.z;
  mm.clearRect(0,0,w,w); mm.fillStyle = 'rgba(20,24,40,.6)'; mm.fillRect(0,0,w,w);
  mm.save(); mm.translate(w/2, w/2);
  mm.fillStyle = 'rgba(120,140,200,.5)';
  for (const b of mapBuildings) {
    const dx = b.x-px0, dz = b.z-pz0;
    if (Math.abs(dx) > viewR+40 || Math.abs(dz) > viewR+40) continue;
    mm.fillRect(dx*scale - b.w*scale/2, dz*scale - b.d*scale/2, Math.max(1,b.w*scale), Math.max(1,b.d*scale));
  }
  const tgt = checkpoints[nextCp];
  if (tgt) { let dx=(tgt.position.x-px0)*scale, dz=(tgt.position.z-pz0)*scale;
    dx=Math.max(-w/2+4,Math.min(w/2-4,dx)); dz=Math.max(-w/2+4,Math.min(w/2-4,dz));
    mm.fillStyle = '#ffd13b'; mm.beginPath(); mm.arc(dx, dz, 3, 0, Math.PI*2); mm.fill(); }
  mm.fillStyle = 'rgba(90,200,255,.85)';
  for (const t of traffic) { const dx=(t.x-px0)*scale, dz=(t.z-pz0)*scale;
    if (Math.abs(dx)<w/2 && Math.abs(dz)<w/2) mm.fillRect(dx-1, dz-1, 2, 2); }
  const copOn = (Math.floor(performance.now()/160) % 2) === 0;
  mm.fillStyle = copOn ? '#ff3333' : '#3355ff';
  for (const c of cops) { const dx=(c.x-px0)*scale, dz=(c.z-pz0)*scale; if (Math.abs(dx)<w/2 && Math.abs(dz)<w/2) mm.fillRect(dx-2, dz-2, 4, 4); }
  const hd = mode==='car' ? heading : player.rotation.y, hx = Math.sin(hd), hz = Math.cos(hd);
  mm.fillStyle = mode==='car' ? '#ff3d7f' : '#3fe07a';
  mm.beginPath(); mm.moveTo(hx*7, hz*7); mm.lineTo(-hz*4-hx*4, hx*4-hz*4); mm.lineTo(hz*4-hx*4, -hx*4-hz*4); mm.closePath(); mm.fill();
  mm.restore();
}
setTimeout(() => { ctrlEl.style.opacity = '0.25'; }, 10000);

// =================================================================
//  POST-PROCESSING (bloom)
// =================================================================
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.22, 0.6, 1.6);
composer.addPass(bloom);
composer.addPass(new OutputPass());

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
});

// =================================================================
//  LOOP
// =================================================================
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const now = performance.now();
  updateLights(dt);
  updateCar(dt);
  updatePlayer(dt);
  updateTraffic(dt);
  updatePeds(dt);
  updateProps(dt);
  updatePolice(dt, now);
  updateParticles(dt);
  updateCheckpoints(dt, now);
  updateCamera(dt, now);
  updateShadowCam();
  updateAudio();
  updateHUD();
  sunSprite.position.copy(camera.position).addScaledVector(sun, 3200);   // sun sits in the sky, occluded by buildings
  cloudDrift += dt * 5;
  { const sx = mode==='car'?car.position.x:player.position.x, sz = mode==='car'?car.position.z:player.position.z;
    for (const cl of clouds) { let ox = ((cl.userData.ox + cloudDrift + 1600) % 3200) - 1600; cl.position.set(sx + ox, cl.userData.oy, sz + cl.userData.oz); } }
  composer.render();
}

buildTrees();     // every tree placed above becomes two instanced draw calls

// audit: nothing that belongs on a sidewalk should be sitting on tarmac
window.__audit = () => {
  const onTarmac = a => a.filter(o => onRoad(o.x, o.z, 0)).length;
  const lamps = props.filter(p => p.type === 'streetlight');
  const walking = peds.filter(p => !p.cross && !p.flee && !p.rag.active);
  return {
    lampsOnRoad: onTarmac(lamps) + '/' + lamps.length,
    propsOnRoad: onTarmac(props) + '/' + props.length,
    // a walker on tarmac is only a bug if it isn't inside a junction (where it is
    // legitimately transiting the crossing street on the painted zebra)
    pedsOnRoadMidBlock: walking.filter(p => {
      if (!onRoad(p.g.position.x, p.g.position.z, 0)) return false;
      const ni = nearestNodeWithStreet(p.g.position.x, p.g.position.z);
      if (ni < 0) return true;
      return Math.hypot(NET.nodes[ni].x - p.g.position.x, NET.nodes[ni].z - p.g.position.z) > 14;
    }).length + '/' + walking.length,
    pedsCrossing: peds.filter(p => p.cross).length,
    pedsKnockedDown: peds.filter(p => p.rag.active).length,
    crossingNodes: crossNodes.size,
    trafficMoving: traffic.filter(t => t.cur > 1).length + '/' + traffic.length,
    trafficMeanSpeed: +(traffic.reduce((s,t) => s+t.cur, 0)/traffic.length).toFixed(1),
  };
};

const loader = document.getElementById('loader');
const bar = loader.querySelector('.bar i');
let prog = 0;
const li = setInterval(() => {
  prog = Math.min(100, prog + 20); bar.style.width = prog + '%';
  if (prog >= 100) { clearInterval(li); setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 800); }, 250); animate(); }
}, 120);
</script>
