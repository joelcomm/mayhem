.lil-gui, .lil-gui * {

  margin: 0;
  padding: 0;

.lil-gui.root {

  display: flex;
  flex-direction: column;
  background: var(--background-color);
}
.lil-gui.root > .title {

  color: var(--title-text-color);
}
.lil-gui.root > .children {
  overflow-x: hidden;
  overflow-y: auto;
}
.lil-gui.root > .children::-webkit-scrollbar {
  width: var(--scrollbar-width);
  height: var(--scrollbar-width);
  background: var(--background-color);
}
.lil-gui.root > .children::-webkit-scrollbar-thumb {
  border-radius: var(--scrollbar-width);
  background: var(--focus-color);
}
@media (pointer: coarse) {
  .lil-gui.allow-touch-styles, .lil-gui.allow-touch-styles .lil-gui {
    --widget-height: 28px;
    --padding: 6px;
    --spacing: 6px;
    --font-size: 13px;
    --input-font-size: 16px;
    --folder-indent: 10px;
    --scrollbar-width: 7px;
    --slider-input-min-width: 50px;
    --color-input-min-width: 65px;
  }
}
.lil-gui.force-touch-styles, .lil-gui.force-touch-styles .lil-gui {
  --widget-height: 28px;
  --padding: 6px;
  --spacing: 6px;
  --font-size: 13px;
  --input-font-size: 16px;
  --folder-indent: 10px;
  --scrollbar-width: 7px;
  --slider-input-min-width: 50px;
  --color-input-min-width: 65px;
}
.lil-gui.autoPlace {
  max-height: 100%;
  position: fixed;
  top: 0;
  right: 15px;
  z-index: 1001;
}

.lil-gui .controller {
  display: flex;
  align-items: center;
  padding: 0 var(--padding);
  margin: var(--spacing) 0;
}
.lil-gui .controller.disabled {
  opacity: 0.5;
}
.lil-gui .controller.disabled, .lil-gui .controller.disabled * {
  pointer-events: none !important;
}
.lil-gui .controller > .name {
  min-width: var(--name-width);
  flex-shrink: 0;
  white-space: pre;
  padding-right: var(--spacing);
  line-height: var(--widget-height);
}
.lil-gui .controller .widget {
  position: relative;
  display: flex;
  align-items: center;
  width: 100%;
  min-height: var(--widget-height);
}
.lil-gui .controller.string input {
  color: var(--string-color);
}
.lil-gui .controller.boolean {
  cursor: pointer;
}
.lil-gui .controller.color .display {
  width: 100%;
  height: var(--widget-height);
  border-radius: var(--widget-border-radius);
  position: relative;
}
@media (hover: hover) {
  .lil-gui .controller.color .display:hover:before {
    content: " ";
    display: block;
    position: absolute;
    border-radius: var(--widget-border-radius);
    border: 1px solid #fff9;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
  }
}
.lil-gui .controller.color input[type=color] {
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}
.lil-gui .controller.color input[type=text] {
  margin-left: var(--spacing);
  font-family: var(--font-family-mono);
  min-width: var(--color-input-min-width);
  width: var(--color-input-width);
  flex-shrink: 0;
}
.lil-gui .controller.option select {
  opacity: 0;
  position: absolute;
  width: 100%;
  max-width: 100%;
}
.lil-gui .controller.option .display {
  position: relative;
  pointer-events: none;
  border-radius: var(--widget-border-radius);
  height: var(--widget-height);
  line-height: var(--widget-height);
  max-width: 100%;
  overflow: hidden;
  word-break: break-all;
  padding-left: 0.55em;
  padding-right: 1.75em;
  background: var(--widget-color);
}
@media (hover: hover) {
  .lil-gui .controller.option .display.focus {
    background: var(--focus-color);
  }
}
.lil-gui .controller.option .display.active {
  background: var(--focus-color);
}
.lil-gui .controller.option .display:after {
  font-family: "lil-gui";
  content: "↕";
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  padding-right: 0.375em;
}
.lil-gui .controller.option .widget,
.lil-gui .controller.option select {
  cursor: pointer;
}
@media (hover: hover) {
  .lil-gui .controller.option .widget:hover .display {
    background: var(--hover-color);
  }
}
.lil-gui .controller.number input {
  color: var(--number-color);
}
.lil-gui .controller.number.hasSlider input {
  margin-left: var(--spacing);
  width: var(--slider-input-width);
  min-width: var(--slider-input-min-width);
  flex-shrink: 0;
}
.lil-gui .controller.number .slider {
  width: 100%;
  height: var(--widget-height);
  background: var(--widget-color);
  border-radius: var(--widget-border-radius);
  padding-right: var(--slider-knob-width);
  overflow: hidden;
  cursor: ew-resize;
  touch-action: pan-y;
}
@media (hover: hover) {
  .lil-gui .controller.number .slider:hover {
    background: var(--hover-color);
  }
}
.lil-gui .controller.number .slider.active {
  background: var(--focus-color);
}
.lil-gui .controller.number .slider.active .fill {
  opacity: 0.95;
}
.lil-gui .controller.number .fill {
  height: 100%;
  border-right: var(--slider-knob-width) solid var(--number-color);
  box-sizing: content-box;
}

.lil-gui-dragging .lil-gui {
  --hover-color: var(--widget-color);
}
.lil-gui-dragging * {
  cursor: ew-resize !important;
}

.lil-gui-dragging.lil-gui-vertical * {
  cursor: ns-resize !important;
}

.lil-gui .title {
  height: var(--title-height);
  line-height: calc(var(--title-height) - 4px);
  font-weight: 600;
  padding: 0 var(--padding);
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
  outline: none;
  text-decoration-skip: objects;
}
.lil-gui .title:before {
  font-family: "lil-gui";
  content: "▾";
  padding-right: 2px;
  display: inline-block;
}
.lil-gui .title:active {
  background: var(--title-background-color);
  opacity: 0.75;
}
@media (hover: hover) {
  body:not(.lil-gui-dragging) .lil-gui .title:hover {
    background: var(--title-background-color);
    opacity: 0.85;
  }
  .lil-gui .title:focus {
    text-decoration: underline var(--focus-color);
  }

.lil-gui.root > .title:focus {
  text-decoration: none !important;
}
.lil-gui.closed > .title:before {
  content: "▸";
}
.lil-gui.closed > .children {
  transform: translateY(-7px);
  opacity: 0;
}
.lil-gui.closed:not(.transition) > .children {
  display: none;
}
.lil-gui.transition > .children {
  transition-duration: 300ms;
  transition-property: height, opacity, transform;

  pointer-events: none;

.lil-gui .children:empty:before {
  content: "Empty";
  padding: 0 var(--padding);
  margin: var(--spacing) 0;
  display: block;
  height: var(--widget-height);
  font-style: italic;
  line-height: var(--widget-height);
  opacity: 0.5;
}
.lil-gui.root > .children > .lil-gui > .title {
  border: 0 solid var(--widget-color);
  border-width: 1px 0;
  transition: border-color 300ms;
}
.lil-gui.root > .children > .lil-gui.closed > .title {
  border-bottom-color: transparent;
}
.lil-gui + .controller {
  border-top: 1px solid var(--widget-color);
  margin-top: 0;
  padding-top: var(--spacing);
}
.lil-gui .lil-gui .lil-gui > .title {
  border: none;
}
.lil-gui .lil-gui .lil-gui > .children {
  border: none;
  margin-left: var(--folder-indent);
  border-left: 2px solid var(--widget-color);
}
.lil-gui .lil-gui .controller {
  border: none;
}

.lil-gui label, .lil-gui input, .lil-gui button {
  -webkit-tap-highlight-color: transparent;
}
.lil-gui input {
  border: 0;
  outline: none;
  font-family: var(--font-family);
  font-size: var(--input-font-size);
  border-radius: var(--widget-border-radius);
  height: var(--widget-height);
  background: var(--widget-color);
  color: var(--text-color);
  width: 100%;
}
@media (hover: hover) {
  .lil-gui input:hover {
    background: var(--hover-color);
  }
  .lil-gui input:active {
    background: var(--focus-color);
  }
}
.lil-gui input:disabled {
  opacity: 1;
}
.lil-gui input[type=text],
.lil-gui input[type=number] {
  padding: var(--widget-padding);
  -moz-appearance: textfield;
}
.lil-gui input[type=text]:focus,
.lil-gui input[type=number]:focus {
  background: var(--focus-color);
}
.lil-gui input[type=checkbox] {
  appearance: none;
  width: var(--checkbox-size);
  height: var(--checkbox-size);
  border-radius: var(--widget-border-radius);
  text-align: center;
  cursor: pointer;
}
.lil-gui input[type=checkbox]:checked:before {
  font-family: "lil-gui";
  content: "✓";
  font-size: var(--checkbox-size);
  line-height: var(--checkbox-size);
}
@media (hover: hover) {
  .lil-gui input[type=checkbox]:focus {
    box-shadow: inset 0 0 0 1px var(--focus-color);
  }
}
.lil-gui button {
  outline: none;
  cursor: pointer;
  font-family: var(--font-family);
  font-size: var(--font-size);
  color: var(--text-color);
  width: 100%;
  height: var(--widget-height);
  text-transform: none;
  background: var(--widget-color);
  border-radius: var(--widget-border-radius);
  border: none;
}
@media (hover: hover) {
  .lil-gui button:hover {
    background: var(--hover-color);
  }
  .lil-gui button:focus {
    box-shadow: inset 0 0 0 1px var(--focus-color);
  }
}
.lil-gui button:active {
  background: var(--focus-color);
}

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Maplewood Mayhem</title>
<style>
  :root { --ink:#1b2340; --sun:#ffd23b; --sky:#4aa8e8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; background:#8fd0f0;
    font-family:"Trebuchet MS", "Segoe UI", system-ui, sans-serif; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  #hud { position:fixed; inset:0; pointer-events:none; color:#fff; }
  .panel { background:rgba(24,32,60,.62); border:3px solid rgba(255,255,255,.9);
    border-radius:16px; box-shadow:0 4px 0 rgba(0,0,0,.28); backdrop-filter:blur(3px); }

  #portrait { position:absolute; left:20px; top:18px; width:92px; height:92px; border-radius:50%;
    border:5px solid #fff; box-shadow:0 4px 0 rgba(0,0,0,.3); overflow:hidden; background:#8fd0f0; }
  #portrait canvas { width:100%; height:100%; }

  #coins { position:absolute; left:124px; top:34px; font-size:34px; font-weight:900; color:var(--sun);
    -webkit-text-stroke:3px var(--ink); paint-order:stroke fill; letter-spacing:1px; }
  #coins small { font-size:17px; opacity:.9; }
  #trophies { position:absolute; left:126px; top:104px; font-size:17px; font-weight:900;
    color:#fff; -webkit-text-stroke:4px var(--ink); paint-order:stroke fill; letter-spacing:.5px; }

  #chaos { position:absolute; left:124px; top:74px; font-size:22px; font-weight:900; color:#ff8a3d;
    -webkit-text-stroke:3px var(--ink); paint-order:stroke fill; letter-spacing:1px; }
  #chaos small { font-size:12px; opacity:.9; }

  #stars { position:absolute; left:22px; top:120px; font-size:26px; letter-spacing:2px;
    color:#ff3b3b; -webkit-text-stroke:2px var(--ink); paint-order:stroke fill;
    opacity:0; transition:opacity .3s; }

  #combo { position:absolute; left:50%; top:112px; transform:translateX(-50%); text-align:center;
    opacity:0; transition:opacity .18s; }
  #combo .m { font-size:46px; font-weight:900; color:var(--sun);
    -webkit-text-stroke:4px var(--ink); paint-order:stroke fill; line-height:1; }
  #combo .p { font-size:15px; font-weight:800; color:#fff;
    -webkit-text-stroke:3px var(--ink); paint-order:stroke fill; }
  #combo .bar { width:150px; height:7px; margin:5px auto 0; border-radius:5px;
    background:rgba(20,26,48,.6); border:2px solid #fff; overflow:hidden; }
  #combo .bar i { display:block; height:100%; background:var(--sun); }

  #objective { position:absolute; left:50%; top:16px; transform:translateX(-50%); padding:9px 22px;
    font-size:15px; font-weight:700; letter-spacing:1px; text-align:center; white-space:nowrap; }
  #objective b { color:var(--sun); }

  #controls { position:absolute; right:18px; top:16px; padding:10px 14px; font-size:12px; line-height:1.65;
    text-align:right; opacity:.9; transition:opacity .5s; }
  #controls b { color:var(--sun); }

  /* The HUD is pointer-events:none so clicks fall through to the canvas (look, kick).
     This is the one thing you can actually press, so it opts back in. */
  #mute { position:absolute; right:18px; top:172px; width:46px; height:46px; padding:0;
    pointer-events:auto; cursor:pointer; font-size:21px; line-height:1; color:#fff;
    font-family:inherit; -webkit-tap-highlight-color:transparent;
    transition:background .15s, transform .1s; }
  #mute:hover { background:rgba(24,32,60,.85); }
  #mute:active { transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.28); }
  #mute.off { opacity:.72; }

  #speedo { position:absolute; right:24px; bottom:210px; text-align:right; }
  #speedo .val { font-size:52px; font-weight:900; -webkit-text-stroke:4px var(--ink); paint-order:stroke fill; line-height:.95; }
  #speedo .unit { font-size:13px; letter-spacing:4px; opacity:.85; -webkit-text-stroke:2px var(--ink); paint-order:stroke fill; }

  #health { position:absolute; right:24px; bottom:186px; width:150px; height:13px; border-radius:8px;
    background:rgba(20,26,48,.6); border:3px solid #fff; overflow:hidden; }
  #health i { display:block; height:100%; width:100%; background:#5ed85e; transition:width .2s, background .2s; }

  #radar { position:absolute; right:22px; bottom:22px; width:154px; height:154px; border-radius:50%;
    border:5px solid #fff; box-shadow:0 4px 0 rgba(0,0,0,.3); overflow:hidden; background:#79c46a; }
  #radar canvas { width:100%; height:100%; }

  #prompt { position:absolute; left:50%; bottom:130px; transform:translateX(-50%); padding:11px 24px;
    font-size:16px; font-weight:800; letter-spacing:.5px; display:none; }
  #prompt b { color:var(--sun); }

  #toast { position:absolute; left:50%; top:46%; transform:translateX(-50%) scale(.7); opacity:0;
    font-size:40px; font-weight:900; color:var(--sun); -webkit-text-stroke:5px var(--ink);
    paint-order:stroke fill; transition:opacity .25s, transform .25s; white-space:nowrap; }
  #toast.show { opacity:1; transform:translateX(-50%) scale(1); }

  #banner { position:absolute; left:50%; top:24%; transform:translateX(-50%) scale(.8); opacity:0;
    text-align:center; transition:opacity .2s, transform .2s; pointer-events:none; white-space:nowrap; }
  #banner.show { opacity:1; transform:translateX(-50%) scale(1); }
  #banner .t { font-size:46px; font-weight:900; letter-spacing:1px; color:var(--sun);
    -webkit-text-stroke:6px var(--ink); paint-order:stroke fill; }
  #banner .s { font-size:19px; font-weight:800; color:#fff;
    -webkit-text-stroke:4px var(--ink); paint-order:stroke fill; margin-top:4px; }

  #round { position:absolute; left:50%; top:62px; transform:translateX(-50%);
    text-align:center; display:none; pointer-events:none; }
  #round .clk { font-size:46px; font-weight:900; letter-spacing:1px; color:#fff;
    -webkit-text-stroke:6px var(--ink); paint-order:stroke fill; }
  #round .clk.hot { color:#ff5340; }
  #round .sc { font-size:21px; font-weight:900; color:var(--sun);
    -webkit-text-stroke:4px var(--ink); paint-order:stroke fill; margin-top:2px; }

  #reticle { position:absolute; left:50%; top:50%; width:26px; height:26px;
    margin:-13px 0 0 -13px; border:3px solid rgba(255,255,255,.92); border-radius:50%;
    box-shadow:0 0 0 2px rgba(20,25,46,.6), inset 0 0 0 2px rgba(20,25,46,.6);
    display:none; pointer-events:none; }
  #reticle::after { content:''; position:absolute; left:50%; top:50%; width:4px; height:4px;
    margin:-2px 0 0 -2px; background:#fff; border-radius:50%;
    box-shadow:0 0 0 1.5px rgba(20,25,46,.7); }

  #shop { position:absolute; left:50%; bottom:96px; transform:translateX(-50%); display:none;
    padding:14px 20px 12px; background:rgba(20,25,46,.88); border:4px solid var(--ink);
    border-radius:14px; color:#fff; min-width:420px; }
  #shop b { font-size:20px; font-weight:900; color:var(--sun); letter-spacing:1px; }
  #shop small { float:right; font-size:14px; font-weight:800; opacity:.85; padding-top:5px; }
  #shop table { width:100%; border-collapse:collapse; margin-top:9px; font-size:14px; font-weight:800; }
  #shop td { padding:3px 6px; white-space:nowrap; }
  #shop td:first-child { color:var(--sun); width:18px; }
  #shop td:nth-child(3) { opacity:.7; font-weight:700; }
  #shop td:last-child { text-align:right; color:var(--sun); }
  #shop tr.no td { opacity:.42; }
  #shop tr.max td:last-child { color:#5ed85e; }

  #tank { position:absolute; left:50%; top:calc(50% + 28px); width:132px; height:11px;
    margin-left:-66px; border:3px solid var(--ink); border-radius:7px;
    background:rgba(255,255,255,.55); display:none; pointer-events:none; }
  #tank i { display:block; height:100%; background:#3fa9e8; border-radius:4px; width:100%;
    transition:width .08s linear; }

  #loader { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:16px; background:linear-gradient(#7cc7ee, #cdebfb); color:var(--ink);
    transition:opacity .7s; }
  #loader h2 { font-size:44px; font-weight:900; letter-spacing:2px; color:#fff;
    -webkit-text-stroke:6px var(--ink); paint-order:stroke fill; }
  #loader .bar { width:260px; height:14px; border-radius:9px; background:rgba(255,255,255,.6);
    border:4px solid var(--ink); overflow:hidden; }
  #loader .bar i { display:block; height:100%; width:0; background:var(--sun); transition:width .25s; }
  #loader small { font-weight:700; letter-spacing:2px; opacity:.75; max-width:80vw; text-align:center; }
</style>

<div id="app"></div>

<div id="hud">
  <div id="portrait"><canvas width="128" height="128"></canvas></div>
  <div id="coins">0 <small>COINS</small></div>
  <div id="chaos">0 <small>CHAOS</small></div>
  <div id="trophies">🏆 0/0</div>
  <div id="stars"></div>
  <div id="combo"><div class="m">x1</div><div class="p">0</div><div class="bar"><i></i></div></div>
  <div id="objective" class="panel">Explore <b>Maplewood</b> · grab the coins</div>
  <div id="controls" class="panel">
    <b>W A S D</b> drive / walk<br>
    <b>Mouse</b> look &nbsp; <b>Shift</b> run<br>
    <b>Space</b> handbrake / jump<br>
    <b>F</b> get in / out &nbsp; <b>C</b> camera<br>
    <b>R</b> reset &nbsp; <b>M</b> map &nbsp; <b>H</b> horn<br>
    <b>N</b> mute
  </div>
  <button id="mute" class="panel" type="button" title="Mute sound (N)"
    aria-label="Mute sound" aria-pressed="false">🔊</button>
  <div id="speedo"><div class="val">0</div><div class="unit">MPH</div></div>
  <div id="health"><i></i></div>
  <div id="radar"><canvas width="154" height="154"></canvas></div>
  <div id="prompt" class="panel"></div>
  <div id="toast"></div>
  <div id="banner"><div class="t"></div><div class="s"></div></div>
  <div id="round"><div class="clk"></div><div class="sc"></div></div>
  <div id="reticle"></div>
  <div id="tank"><i></i></div>
  <div id="shop"></div>
</div>

<div id="loader">
  <h2>MAPLEWOOD MAYHEM</h2>
  <div class="bar"><i></i></div>
  <small>BUILDING THE TOWN…</small>
</div>

<script>
// A module-level throw otherwise leaves the loading screen up forever with nothing in the
// console, so surface it on the loader itself.
window.addEventListener('error', e => {
  window.__err = (e.message||'') + ' @ ' + (e.filename||'').split('/').pop() + ':' + e.lineno + ':' + e.colno;
  const l = document.getElementById('loader'); if (!l) return;
  l.querySelector('h2').textContent = 'BUILD FAILED';
  const s = l.querySelector('small');
  s.textContent = window.__err; s.style.cssText = 'color:#b1152a;font-size:13px;letter-spacing:0;max-width:80vw;text-align:center';
});
</script>
